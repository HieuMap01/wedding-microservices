server:
  port: 8083

spring:
  application:
    name: interaction-service
  datasource:
    url: jdbc:mysql://localhost:3306/interaction_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:12092003}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring.data.redis:
  host: localhost
  port: 6379

spring.mail:
  host: smtp.gmail.com
  port: 587
  username: ${SPRING_MAIL_USERNAME:your-email@gmail.com}
  password: ${SPRING_MAIL_PASSWORD:your-app-password}
  default-encoding: UTF-8
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

app:
  mail:
    admin: ${APP_MAIL_ADMIN:admin@example.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
